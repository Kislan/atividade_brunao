<h1>Calcula a média de uma disciplina</h1>
<form>
    <div>
        <label for="b1">Bimestre 1</label>
        <input id="b1" type="number" #b1>
    </div>
    <div>
        <label for="b2">Bimestre 2</label>
        <input id="b2" type="number" #b2>
    </div>
    <div>
        <label for="b3">Bimestre 3</label>
        <input id="b3" type="number" #b3>
    </div>
    <div>
        <label for="b4">Bimestre 4</label>
        <input id="b4" type="number" #b4>
    </div>
    <div>
        <input type="button" value="Calcular"
               (click)="calcularMediaParcial(+b1.value,
                +b2.value, +b3.value, +b4.value)">
    </div>
    @if (mediaParcial) {
    <div class="result-parcial">
        <p>Média parcial = {{mediaParcial}}</p>
        @if (mediaParcial && mediaParcial > 60) {
            <p>Aprovado</p>
        }
    </div>
}
    @if (mediaParcial && mediaParcial < 60) {
        <div class="avaliação-final">
        <label for="avFinal">Avaliação Final</label>
        <input id="avFinal" type="number" #avFinal>
    </div>
    <div>
        <input type="button" value="Calcular Final"
               (click)="calcularMediaFinal(+avFinal.value)">
    </div>
}
</form>


@if (mediaFinal) {
    <div class="result-final">
        <p>Média final = {{mediaFinal}}</p>
        <p>Situação: {{situacao}}</p>
    </div>
}
